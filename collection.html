<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimum French, Maximum Paris — The Complete Collection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 0 24px 60px; }
        .header { width: 100%; max-width: 480px; padding: 48px 0 40px; text-align: center; border-bottom: 1px solid #222; margin-bottom: 48px; }
        .brand { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: #555; margin-bottom: 16px; }
        .title { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 12px; }
        .subtitle { font-size: 13px; color: #666; letter-spacing: 1px; text-transform: uppercase; }
        .decks { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 16px; }
        .deck { border: 1px solid #222; padding: 28px; display: flex; align-items: center; justify-content: space-between; text-decoration: none; color: #fff; transition: border-color 0.2s, background 0.2s; }
        .deck:hover { border-color: #fff; background: #111; }
        .deck-info { display: flex; flex-direction: column; gap: 4px; }
        .deck-number { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: #555; }
        .deck-name { font-size: 16px; font-weight: 500; letter-spacing: 0.5px; }
        .deck-count { font-size: 11px; color: #555; letter-spacing: 1px; margin-top: 2px; }
        .deck-arrow { font-size: 18px; color: #444; transition: color 0.2s; }
        .deck:hover .deck-arrow { color: #fff; }
        .footer { width: 100%; max-width: 480px; margin-top: 48px; padding-top: 32px; border-top: 1px solid #222; text-align: center; }
        .footer-text { font-size: 11px; color: #444; letter-spacing: 2px; text-transform: uppercase; line-height: 2; }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand">Minimum French</div>
        <div class="title">Maximum Paris</div>
        <div class="subtitle">The Complete Collection — 4 Decks</div>
    </div>

    <div class="decks">
        <a class="deck" href="https://minimumfrench.github.io/-flashcards/flirting.html" target="_blank">
            <div class="deck-info">
                <div class="deck-number">Deck 01</div>
                <div class="deck-name">Maximum Flirting</div>
                <div class="deck-count">30 phrases</div>
            </div>
            <div class="deck-arrow">→</div>
        </a>
        <a class="deck" href="https://minimumfrench.github.io/-flashcards/dating.html" target="_blank">
            <div class="deck-info">
                <div class="deck-number">Deck 02</div>
                <div class="deck-name">Maximum Dating</div>
                <div class="deck-count">30 phrases</div>
            </div>
            <div class="deck-arrow">→</div>
        </a>
        <a class="deck" href="https://minimumfrench.github.io/-flashcards/wine.html" target="_blank">
            <div class="deck-info">
                <div class="deck-number">Deck 03</div>
                <div class="deck-name">Maximum Wine</div>
                <div class="deck-count">30 phrases</div>
            </div>
            <div class="deck-arrow">→</div>
        </a>
        <a class="deck" href="https://minimumfrench.github.io/-flashcards/dining.html" target="_blank">
            <div class="deck-info">
                <div class="deck-number">Deck 04</div>
                <div class="deck-name">Maximum Dining</div>
                <div class="deck-count">30 phrases</div>
            </div>
            <div class="deck-arrow">→</div>
        </a>
    </div>

    <div class="footer">
        <div class="footer-text">120 phrases · Audio included · Mobile friendly<br>Minimum French, Maximum Paris</div>
    </div>
</body>
</html>
